[main]
font=Cantarell:size=14
# Standard Adwaita icon size is 32px
icon-size=42                  
# Line-height should be ~10-12px taller than icon-size for a clean gap
line-height=18
icon-theme=Colloid-Dark               
# A narrower width (30% of screen) keeps it from looking like a giant bar
width=30                       
horizontal-pad=50              
vertical-pad=15                
inner-pad=10                   
image-size-ratio=0.5           

[colors]
# Adwaita Dark (Same as before)
background=1e1e1eff
text=eeeeecff
match=3584e4ff
selection=3584e4ff
selection-text=ffffffff
selection-match=ffffffff
border=353535ff

[border]
width=2
# Radius should be roughly half the vertical-pad + line-height to stay a pill
radius=24